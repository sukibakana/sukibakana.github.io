<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>应用内部样式</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            background: #fff;
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 20px;
            max-width: 90%;
            width: 400px; /* 设置最大宽度和固定宽度，可根据需要进行调整 */
        }

        .header {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            border-radius: 20px 20px 0 0;
        }

        .content {
            padding: 20px;
        }

        .footer {
            background: #333;
            text-align: center;
            color: #fff;
            padding: 10px;
            border-radius: 0 0 20px 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>应用内部样式</h1>
        </div>
        <div class="content">
            <p>This is the content area. You can add your content here.</p>
        </div>
        <div class="footer">
            <p>Footer</p>
        </div>
    </div>
</body>
</html>
