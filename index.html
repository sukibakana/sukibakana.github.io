<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩</title>
    <link rel="icon" href="Nagatoro.jpg" sizes="16x16">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 300px;
            padding: 5px 10px; /* 更窄的上下内边距 */
            border: 2px solid #f0f0f0;
            border-radius: 20px;
            background: linear-gradient(#f0f0f0, #f0f0f0);
            transition: background 0.3s, border-color 0.3s;
        }

        .search-box:hover {
            background: linear-gradient(#ffffff, #ffffff);
            border-color: #3498db;
        }

        .search-box:focus-within {
            outline: none;
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: linear-gradient(#f0f0f0, #f0f0f0);
        }

        .search-box:hover .search-input {
            background: linear-gradient(#ffffff, #ffffff);
        }

        .search-button {
            background: transparent;
            border: none;
            padding: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        .search-button i {
            font-size: 20px;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="少女祈祷中...">
        <button id="search-button" class="search-button">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');

        function performSearch() {
            const searchText = searchInput.value;
            const searchURL = `https://search.bilibili.com/all?keyword=${searchText}`;
            window.open(searchURL, '_blank');
        }

        searchButton.addEventListener('click', performSearch);

        searchInput.addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
